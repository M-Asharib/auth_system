name: v1.4.2 Compliance Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 1. Linter Engine (PEP8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 2. Static Security Audit (SAST)
      run: |
        bandit -r app/ -ll -v
        
    - name: 3. Asynchronous Integration Suites
      env:
        SECRET_KEY_ACCESS: "test_secret_access_key_must_be_long_enough"
        SECRET_KEY_REFRESH: "test_secret_refresh_key_must_be_long_enough"
        REDIS_URL: "redis://localhost:6379"
        DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      run: |
        python -m pytest -vv
