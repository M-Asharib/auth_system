name: v1.4.2 Compliance Pipeline

on:
  push:
    branches: [ main, stable ]
  pull_request:
    branches: [ main, stable ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linter Engine (PEP8 & Unused Refs)
        run: |
          # F401: Unused imports, F841: Unused variables
          pip install ruff
          ruff check . --select E,F,W,B --ignore E501

      - name: Static Security Audit (SAST)
        run: |
          pip install bandit
          # Block on weak crypto or hardcoded creds
          bandit -r app -ll -x tests

      - name: Asynchronous Suites (Integration Tests)
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: auth_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY_ACCESS: test-access-secret-key-123
          SECRET_KEY_REFRESH: test-refresh-secret-key-123
          ALGORITHM: HS256
        run: |
          pytest tests/ --asyncio-mode=auto
