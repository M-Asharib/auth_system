<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Enterprise Core</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-card card">
        <header style="padding: 0; text-align: left; margin-bottom: 2.5rem;">
            <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Join</h1>
            <p class="subtitle" style="margin: 0; font-size: 1rem;">Create your secure identity on the platform.</p>
        </header>

        <form id="register-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Choose Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="new-password">
            </div>
            <button type="submit" id="submit-btn">Register Identity</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Sign in here</a>
        </div>
        
        <div id="error-message" style="margin-top: 1.5rem; color: var(--error); font-size: 0.85rem; text-align: center; display: none; padding: 0.75rem; background: rgba(255, 59, 48, 0.1); border-radius: 12px; border: 1px solid rgba(255, 59, 48, 0.2);">
        </div>
        
        <div id="success-message" style="margin-top: 1.5rem; color: var(--success); font-size: 0.85rem; text-align: center; display: none; padding: 0.75rem; background: rgba(52, 199, 89, 0.1); border-radius: 12px; border: 1px solid rgba(52, 199, 89, 0.2);">
            Registration successful! Redirecting to login...
        </div>
    </div>

    <script src="fingerprint.js"></script>
    <script>
        const API_URL = window.location.origin;
        const form = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State
            submitBtn.disabled = true;
            submitBtn.innerText = 'Creating Account...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Device-Fingerprint': getDeviceFingerprint()
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    errorDiv.innerText = data.detail || 'Registration failed.';
                    errorDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Register Identity';
                }
            } catch (err) {
                errorDiv.innerText = 'Network connection failed.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Register Identity';
            }
        });
    </script>
</body>
</html>
