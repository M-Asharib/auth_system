<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Core Auth - Validation Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title .icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.active { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .status-badge.inactive { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .status-badge.warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        #log-container {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            height: 400px;
            overflow-y: auto;
            background: #000;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-time { color: var(--text-dim); margin-right: 0.5rem; }
        .log-type-info { color: var(--primary); }
        .log-type-success { color: var(--success); }
        .log-type-error { color: var(--error); }
        .log-type-warn { color: var(--warning); }

        .token-display {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            word-break: break-all;
            font-size: 0.75rem;
            color: var(--text-dim);
            max-height: 100px;
            overflow-y: auto;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            width: auto;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .hidden { display: none; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Enterprise Core Auth</h1>
        <p class="subtitle">Deliverable Validation Framework v1.4.2</p>
    </header>

    <main>
        <section class="left-panel">
            <div class="card">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showTab('login')">Login</button>
                    <button class="tab-btn" onclick="showTab('register')">Register</button>
                </div>

                <div id="login-form">
                    <div class="card-title">
                        <div class="icon">🔑</div>
                        Authentication
                    </div>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="login-email" required value="admin@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" required value="password123">
                        </div>
                        <button type="submit">Authenticate Session</button>
                    </form>
                </div>

                <div id="register-form" class="hidden">
                    <div class="card-title">
                        <div class="icon">👤</div>
                        Create Account
                    </div>
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="reg-email" required placeholder="user@enterprise.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="reg-password" required placeholder="••••••••">
                        </div>
                        <button type="submit">Register Identity</button>
                    </form>
                </div>

                <div id="session-info" class="hidden">
                    <div class="card-title">
                        <div class="icon">⚡</div>
                        Active Session
                    </div>
                    <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <span>Session Status:</span>
                        <span id="session-status" class="status-badge active">Validated</span>
                    </div>
                    <div class="grid-2">
                        <button class="secondary" onclick="fetchProfile()">Fetch Profile</button>
                        <button class="secondary" onclick="rotateToken()">Rotate Token</button>
                    </div>
                    <div class="grid-2" style="margin-top: 1rem;">
                        <button class="secondary" onclick="logout()" style="color: var(--error); border-color: var(--error);">Revoke Session</button>
                        <button class="secondary" onclick="testInvalid()" style="color: var(--warning);">Test Zero-Trust</button>
                    </div>
                    
                    <div class="token-display" id="access-token-view">Access Token: None</div>
                    <div class="token-display" id="refresh-token-view">Refresh Token: None</div>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <div class="card" style="height: 100%;">
                <div class="card-title">
                    <div class="icon" style="background: #000;">💻</div>
                    System Verification Log
                </div>
                <div id="log-container">
                    <div class="log-entry">
                        <span class="log-time">[Init]</span>
                        <span class="log-type-info">Awaiting system trigger...</span>
                    </div>
                </div>
                <button class="secondary" onclick="clearLogs()" style="margin-top: 1rem; width: auto; font-size: 0.8rem;">Clear Terminal</button>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'http://localhost:8000';
        let accessToken = null;
        let refreshToken = null;

        function showTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tab);
            });
        }

        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-type-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            log(`Attempting registration for: ${email}`, 'info');
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Identity created! ID: ${data.id}, Active: ${data.is_active}`, 'success');
                    showTab('login');
                } else {
                    log(`Registration Failed: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            log(`Initiating Auth Sequence for: ${email}`, 'info');
            
            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    log(`Auth Successful! Protocol: ${data.token_type}`, 'success');
                    log(`Access Token issued (15m lifespan)`, 'success');
                    
                    document.getElementById('access-token-view').innerText = `Access Token: ${accessToken}`;
                    document.getElementById('refresh-token-view').innerText = `Refresh Token: ${refreshToken}`;
                    
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('session-info').classList.remove('hidden');
                    document.querySelector('.tab-buttons').classList.add('hidden');
                } else {
                    log(`Auth Failed: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function fetchProfile() {
            log('Requesting protected profile data...', 'info');
            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Profile Retrieved: ${JSON.stringify(data)}`, 'success');
                } else if (res.status === 401) {
                    log('Access Token Expired or Revoked!', 'warn');
                    document.getElementById('session-status').innerText = 'Invalid';
                    document.getElementById('session-status').className = 'status-badge inactive';
                } else {
                    log(`Error: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function rotateToken() {
            log('Initiating Token Rotation Sequence...', 'info');
            try {
                const res = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: refreshToken })
                });
                const data = await res.json();
                if (res.ok) {
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    log('Rotation Success! New token pair generated.', 'success');
                    document.getElementById('access-token-view').innerText = `Access Token: ${accessToken}`;
                    document.getElementById('refresh-token-view').innerText = `Refresh Token: ${refreshToken}`;
                } else {
                    log(`Rotation Failed: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function logout() {
            log('Initiating Stateful Revocation...', 'info');
            try {
                const res = await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Logout Complete: ${data.detail}`, 'success');
                    log('Access Token has been blacklisted in Redis.', 'warn');
                    
                    // We keep the local token to test "Post-Validation"
                    document.getElementById('session-status').innerText = 'Revoked';
                    document.getElementById('session-status').className = 'status-badge inactive';
                } else {
                    log(`Logout Error: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function testInvalid() {
            log('Testing Zero-Trust: Attempting access with Revoked Token...', 'warn');
            await fetchProfile();
        }

    </script>
</body>
</html>
