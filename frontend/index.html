<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Enterprise Core Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        main {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 3rem;
        }
        @media (max-width: 1000px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>System Dashboard</h1>
        <p class="subtitle">v1.4.2-Prod Security Control Hub</p>
    </header>

    <main>
        <section class="left-panel">
            <div class="card">
                <div id="session-info">
                    <div class="card-title">
                        <span class="icon">⚡</span>
                        Active Session
                    </div>
                    <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                        <span>Session Status:</span>
                        <span id="session-status" class="status-badge active">Validated</span>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button class="secondary" onclick="fetchProfile()">Fetch Profile</button>
                        <button class="secondary" onclick="rotateToken()">Rotate Token</button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <button class="secondary" onclick="logout()" style="color: var(--error); border-color: var(--error);">Revoke Session</button>
                        <button class="secondary" onclick="window.location.href='users.html'" style="color: var(--primary);">Users Directory</button>
                    </div>
                    <button class="secondary" onclick="testInvalid()" style="color: var(--warning); margin-top: 1rem; width: 100%;">Test Zero-Trust</button>
                    
                    <div class="token-display" id="access-token-view">Access Token: Loaded</div>
                    <div class="token-display" id="refresh-token-view">Refresh Token: Loaded</div>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <div class="card" style="height: 100%;">
                <div class="card-title">
                    <span class="icon" style="background: #000;">💻</span>
                    Verification Log
                </div>
                <div id="log-container"></div>
                <button class="secondary" onclick="clearLogs()" style="margin-top: 1.5rem; width: auto; font-size: 0.8rem;">Clear Terminal</button>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'http://localhost:8000';
        let accessToken = localStorage.getItem('access_token');
        let refreshToken = localStorage.getItem('refresh_token');

        // Redirect if not authenticated
        if (!accessToken) {
            window.location.href = 'login.html';
        }

        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-type-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() { document.getElementById('log-container').innerHTML = ''; }

        async function fetchProfile() {
            log('Requesting protected profile data...', 'info');
            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Profile Retrieved: ${JSON.stringify(data)}`, 'success');
                } else if (res.status === 401) {
                    log('Access Token Expired or Revoked!', 'warn');
                    document.getElementById('session-status').innerText = 'Invalid';
                    document.getElementById('session-status').className = 'status-badge inactive';
                } else {
                    log(`Error: ${data.detail}`, 'error');
                }
            } catch (err) { log(`Network Error: ${err.message}`, 'error'); }
        }

        async function rotateToken() {
            log('Initiating Token Rotation Sequence...', 'info');
            try {
                const res = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: refreshToken })
                });
                const data = await res.json();
                if (res.ok) {
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    localStorage.setItem('access_token', accessToken);
                    localStorage.setItem('refresh_token', refreshToken);
                    log('Rotation Success! New token pair generated.', 'success');
                    updateTokenViews();
                } else {
                    log(`Rotation Failed: ${data.detail}`, 'error');
                }
            } catch (err) { log(`Network Error: ${err.message}`, 'error'); }
        }

        async function logout() {
            log('Initiating Stateful Revocation...', 'info');
            try {
                const res = await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Logout Complete: ${data.detail}`, 'success');
                    log('Access Token blacklisted in Redis.', 'warn');
                    document.getElementById('session-status').innerText = 'Revoked';
                    document.getElementById('session-status').className = 'status-badge inactive';
                } else { log(`Logout Error: ${data.detail}`, 'error'); }
            } catch (err) { log(`Network Error: ${err.message}`, 'error'); }
        }

        function testInvalid() {
            log('Testing Zero-Trust: Attempting access with Revoked Token...', 'warn');
            fetchProfile();
        }

        function updateTokenViews() {
            document.getElementById('access-token-view').innerText = `Access Token: ${accessToken}`;
            document.getElementById('refresh-token-view').innerText = `Refresh Token: ${refreshToken}`;
        }

        updateTokenViews();
        log('Dashboard initialized. System secure.', 'success');
    </script>
</body>
</html>
