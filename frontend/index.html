<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Enterprise Core Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🛡️</span>
                <span>Core Auth</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Identities</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <span class="icon">🚫</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <div class="main-content">
            <header>
                <h1>Security Control Hub</h1>
                <p class="subtitle">Real-time status and lifecycle management</p>
            </header>

            <main class="dashboard-grid">
                <section class="control-panel">
                    <div class="card">
                        <div class="card-title">
                            <span class="icon">🛡️</span>
                            Security Hub
                        </div>
                        
                        <div class="status-row">
                            <div class="status-item">
                                <label>Session</label>
                                <span id="session-status" class="status-badge active">Verified</span>
                            </div>
                            <div class="status-item">
                                <label>Provider</label>
                                <span class="status-badge info">Enterprise Auth</span>
                            </div>
                        </div>

                        <div class="action-section">
                            <label>Identity Management</label>
                            <div class="button-grid">
                                <button class="secondary" onclick="fetchProfile()">
                                    <span>👤</span> Profile
                                </button>
                                <button class="secondary" onclick="rotateToken()">
                                    <span>🔄</span> Rotate
                                </button>
                                <button class="secondary btn-users" onclick="window.location.href='users.html'">
                                    <span>👥</span> Users
                                </button>
                                <button class="secondary btn-revoke" onclick="logout()">
                                    <span>🚫</span> Revoke
                                </button>
                            </div>
                        </div>

                        <div class="action-section">
                            <label>Zero-Trust Verification</label>
                            <button class="secondary btn-test" onclick="testInvalid()">
                                <span>⚡</span> Execute Malicious Request Simulation
                            </button>
                        </div>
                    </div>

                    <div class="card token-card" style="margin-top: 2rem;">
                        <div class="card-title">
                            <span class="icon">🔑</span>
                            Token Registry
                        </div>
                        <div class="side-by-side-tokens">
                            <div class="token-container">
                                <div class="token-header">
                                    <span>Access</span>
                                    <div class="token-actions">
                                        <button onclick="toggleToken('access')">👁️</button>
                                        <button onclick="copyToken('access')">📋</button>
                                    </div>
                                </div>
                                <div id="access-token-view" class="token-box truncated">Loading...</div>
                            </div>

                            <div class="token-container">
                                <div class="token-header">
                                    <span>Refresh</span>
                                    <div class="token-actions">
                                        <button onclick="toggleToken('refresh')">👁️</button>
                                        <button onclick="copyToken('refresh')">📋</button>
                                    </div>
                                </div>
                                <div id="refresh-token-view" class="token-box truncated">Loading...</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="audit-panel">
                    <div class="card card-log">
                        <div class="card-title">
                            <span class="icon">💻</span>
                            Audit Log
                        </div>
                        <div id="log-container"></div>
                        <div class="log-footer">
                            <button class="secondary btn-clear" onclick="clearLogs()">Clear Console</button>
                            <span class="system-status">Live Monitoring</span>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Redirect if not authenticated
        if (!localStorage.getItem('access_token')) {
            window.location.href = 'login.html';
        }

        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-type-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() { document.getElementById('log-container').innerHTML = ''; }

        async function fetchProfile(isRetry = false) {
            log('Requesting protected profile data...', 'info');
            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                });

                if (res.status === 401 && !isRetry) {
                    log('Access Token expired. Attempting silent rotation...', 'warn');
                    const success = await rotateToken(true);
                    if (success) return fetchProfile(true);
                }

                const data = await res.json();
                if (res.ok) {
                    log(`Profile Retrieved: ${JSON.stringify(data)}`, 'success');
                    document.getElementById('session-status').innerText = 'Verified';
                    document.getElementById('session-status').className = 'status-badge active';
                } else if (res.status === 401) {
                    log('Access Token Expired or Revoked!', 'warn');
                    document.getElementById('session-status').innerText = 'Invalid';
                    document.getElementById('session-status').className = 'status-badge inactive';
                } else {
                    log(`Error: ${data.detail}`, 'error');
                }
            } catch (err) { log(`Network Error: ${err.message}`, 'error'); }
        }

        async function rotateToken(silent = false) {
            if (!silent) log('Initiating Token Rotation Sequence...', 'info');
            const refreshToken = localStorage.getItem('refresh_token');
            try {
                const res = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: refreshToken })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    if (!silent) log('Rotation Success! New token pair generated.', 'success');
                    updateTokenViews();
                    return true;
                } else {
                    if (!silent) log(`Rotation Failed: ${data.detail}`, 'error');
                    window.location.href = 'login.html';
                    return false;
                }
            } catch (err) { 
                if (!silent) log(`Network Error: ${err.message}`, 'error'); 
                return false;
            }
        }

        async function logout() {
            log('Initiating Stateful Revocation...', 'info');
            try {
                const res = await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                });
                const data = await res.json();
                if (res.ok) {
                    log(`Logout Complete: ${data.detail}`, 'success');
                    log('Access Token blacklisted in Redis.', 'warn');
                    document.getElementById('session-status').innerText = 'Revoked';
                    document.getElementById('session-status').className = 'status-badge inactive';
                    
                    // Clear local storage
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else { log(`Logout Error: ${data.detail}`, 'error'); }
            } catch (err) { log(`Network Error: ${err.message}`, 'error'); }
        }

        function testInvalid() {
            log('Testing Zero-Trust: Attempting access with Revoked Token...', 'warn');
            fetchProfile();
        }

        function toggleToken(type) {
            const el = document.getElementById(`${type}-token-view`);
            el.classList.toggle('truncated');
        }

        function copyToken(type) {
            const token = localStorage.getItem(`${type}_token`);
            navigator.clipboard.writeText(token);
            log(`${type.charAt(0).toUpperCase() + type.slice(1)} Token copied to clipboard!`, 'success');
        }

        function updateTokenViews() {
            document.getElementById('access-token-view').innerText = localStorage.getItem('access_token');
            document.getElementById('refresh-token-view').innerText = localStorage.getItem('refresh_token');
        }

        updateTokenViews();
        log('Security Control Hub Online. All systems nominal.', 'success');
    </script>
</body>
</html>
