<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Enterprise Core Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🛡️</span>
                <span>Core Auth</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Identities</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()" style="margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                    <span class="icon">🚫</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <div class="main-content">
            <header>
                <h1>Security Control Hub</h1>
                <p class="subtitle">Real-time status and lifecycle management</p>
            </header>

            <main class="dashboard-grid">
                <section class="control-panel">
                    <!-- Status Pulse -->
                    <div class="status-grid">
                        <div class="status-item">
                            <label>Identity Status</label>
                            <div id="user-status-badge" class="status-badge active">Verified</div>
                        </div>
                        <div class="status-item">
                            <label>Redis Cache</label>
                            <div id="redis-status-badge" class="status-badge info">Active</div>
                        </div>
                    </div>

                    <!-- Profile Card -->
                    <div class="card" style="margin-bottom: 2rem;">
                        <div class="card-title">
                            <span class="icon">👤</span>
                            Active Profile
                        </div>
                        <div id="profile-display" style="margin-bottom: 1.5rem;">
                            <div style="font-size: 1.25rem; font-weight: 600;" id="user-email">Loading...</div>
                            <div style="color: var(--text-dim); font-size: 0.9rem;" id="user-role">Account Holder</div>
                        </div>
                        <div class="button-grid">
                            <button class="secondary" onclick="rotateToken()">
                                <span>🔄</span> Rotate
                            </button>
                            <button class="secondary btn-revoke" onclick="logout()">
                                <span>🚫</span> Revoke
                            </button>
                        </div>
                    </div>

                    <!-- System Pulse -->
                    <div class="card" style="margin-bottom: 2rem;">
                        <div class="card-title">
                            <span class="icon">📈</span>
                            System Pulse
                        </div>
                        <div class="status-grid" style="grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                            <div class="status-item" style="text-align: center;">
                                <label>Total Users</label>
                                <div id="stat-users" style="font-size: 1.5rem; font-weight: 700;">--</div>
                            </div>
                            <div class="status-item" style="text-align: center;">
                                <label>Admins</label>
                                <div id="stat-admins" style="font-size: 1.5rem; font-weight: 700;">--</div>
                            </div>
                            <div class="status-item" style="text-align: center;">
                                <label>Revocations</label>
                                <div id="stat-revoked" style="font-size: 1.5rem; font-weight: 700;">--</div>
                            </div>
                        </div>
                    </div>

                    <!-- Token Management -->
                    <div class="card token-card">
                        <div class="card-title">
                            <span class="icon">🔑</span>
                            Token Registry
                        </div>
                        <div class="side-by-side-tokens">
                            <div class="token-container">
                                <div class="token-header">
                                    <span>Access</span>
                                    <div class="token-actions">
                                        <button onclick="toggleToken('access')">👁️</button>
                                        <button onclick="copyToken('access')">📋</button>
                                    </div>
                                </div>
                                <div id="access-token-view" class="token-box truncated">Loading...</div>
                            </div>

                            <div class="token-container">
                                <div class="token-header">
                                    <span>Refresh</span>
                                    <div class="token-actions">
                                        <button onclick="toggleToken('refresh')">👁️</button>
                                        <button onclick="copyToken('refresh')">📋</button>
                                    </div>
                                </div>
                                <div id="refresh-token-view" class="token-box truncated">Loading...</div>
                            </div>
                        </div>
                        <button class="secondary btn-test" style="margin-top: 1.5rem;" onclick="testInvalid()">
                            <span>⚡</span> Execute Zero-Trust Attack Simulation
                        </button>
                    </div>
                </section>

                <section class="audit-panel">
                    <div class="card card-log">
                        <div class="card-title">
                            <span class="icon">💻</span>
                            Audit Log
                        </div>
                        <div id="log-container"></div>
                        <div class="log-footer">
                            <button class="secondary btn-clear" onclick="clearLogs()">Clear Console</button>
                            <div class="system-status">Monitoring Engine v1.4.2</div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="fingerprint.js"></script>
    <script>
        const API_URL = window.location.origin;

        // Redirect if not authenticated
        if (!localStorage.getItem('access_token')) {
            window.location.href = 'login.html';
        }

        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-type-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        async function fetchProfile() {
            try {
                const res = await secureFetch(`${API_URL}/users/me`);
                const data = await res.json();
                if (res.ok) {
                    log(`Identity Verified: ${data.email}`, 'success');
                    document.getElementById('user-email').innerText = data.email;
                    if (data.is_superuser) {
                        document.getElementById('user-role').innerText = 'System Administrator';
                        document.getElementById('user-role').style.color = 'var(--primary)';
                    }
                    // Fetch Stats too
                    fetchStats();
                } else {
                    log(`Auth Failure: ${data.detail}`, 'error');
                    if (res.status === 401) {
                        localStorage.removeItem('access_token');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    }
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function fetchStats() {
            try {
                const res = await secureFetch(`${API_URL}/users/stats`);
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('stat-users').innerText = data.total_users;
                    document.getElementById('stat-admins').innerText = data.admin_count;
                    document.getElementById('stat-revoked').innerText = data.revocation_pulse;
                    
                    // Update Redis status
                    const redisBadge = document.getElementById('redis-status-badge');
                    if (data.revocation_pulse !== undefined) {
                        redisBadge.innerText = 'Active';
                        redisBadge.className = 'status-badge active';
                    } else {
                        redisBadge.innerText = 'Failsafe';
                        redisBadge.className = 'status-badge warning';
                    }
                }
            } catch (err) {
                console.error('Stats fetch failed', err);
            }
        }

        async function rotateToken() {
            const refreshToken = localStorage.getItem('refresh_token');
            try {
                const res = await secureFetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    body: JSON.stringify({ refresh_token: refreshToken }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    log('Tokens Rotated Successfully', 'success');
                    displayTokens();
                } else {
                    log(`Rotation Failed: ${data.detail}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }

        async function logout() {
            try {
                const res = await secureFetch(`${API_URL}/auth/logout`, { method: 'POST' });
                if (res.ok) {
                    log('Session Revoked Successfully', 'warn');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    setTimeout(() => window.location.href = 'login.html', 1000);
                }
            } catch (err) {
                log(`Logout Error: ${err.message}`, 'error');
            }
        }

        async function testInvalid() {
            log('Simulating Malicious Request...', 'warn');
            // Simulate identity drift by manually modifying the fingerprint header
            const fingerprint = getDeviceFingerprint();
            const token = localStorage.getItem('access_token');
            
            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'X-Device-Fingerprint': 'FAKE_STOLEN_FINGERPRINT'
                    }
                });
                const data = await res.json();
                if (!res.ok) {
                    log(`ZERO-TRUST SUCCESS: ${data.detail}`, 'success');
                    log(`ACTION: Token has been auto-blacklisted.`, 'error');
                    // Check if we are now blocked
                    const checkRes = await secureFetch(`${API_URL}/users/me`);
                    if (checkRes.status === 401) {
                        log('CONFIRMED: Access Permanently Denied for this token.', 'error');
                    }
                }
            } catch (err) {
                log(`Simulation Error: ${err.message}`, 'error');
            }
        }

        function displayTokens() {
            const access = localStorage.getItem('access_token');
            const refresh = localStorage.getItem('refresh_token');
            document.getElementById('access-token-view').innerText = access || 'None';
            document.getElementById('refresh-token-view').innerText = refresh || 'None';
        }

        function toggleToken(type) {
            const el = document.getElementById(`${type}-token-view`);
            el.classList.toggle('truncated');
        }

        function copyToken(type) {
            const token = localStorage.getItem(`${type}_token`);
            navigator.clipboard.writeText(token);
            log(`${type.charAt(0).toUpperCase() + type.slice(1)} Token Copied to Clipboard`, 'info');
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '';
        }

        // Initial setup
        displayTokens();
        fetchProfile();

        // Silent Refresh Logic
        setInterval(async () => {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            const payload = JSON.parse(atob(token.split('.')[1]));
            const exp = payload.exp * 1000;
            if (exp - Date.now() < 60000) { // 1 min before expiry
                log('Initiating Silent Healing...', 'warn');
                await rotateToken();
            }
        }, 30000);
    </script>
</body>
</html>
