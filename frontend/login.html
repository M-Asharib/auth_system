<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Enterprise Core Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Welcome Back</h1>
        <p class="subtitle">Authenticate your session to access the dashboard</p>
    </header>

    <main>
        <div class="auth-container">
            <div class="card">
                <div class="card-title">
                    <span class="icon">🔑</span>
                    Sign In
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="admin@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit">Authenticate Identity</button>
                </form>
                <div class="footer-link">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>
    </main>

    <script src="fingerprint.js"></script>
    <script>
        const API_URL = window.location.origin;
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            try {
                // Manually add fingerprint for login
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Device-Fingerprint': getDeviceFingerprint()
                    }
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    window.location.href = 'index.html';
                } else {
                    alert(`Login Failed: ${data.detail}`);
                }
            } catch (err) {
                alert(`Network Error: ${err.message}`);
            }
        });
    </script>
</body>
</html>
